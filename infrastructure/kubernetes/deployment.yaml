apiVersion: apps/v1
kind: Deployment
metadata:
  name: plantmd-api
  labels:
    app: plantmd-api
    version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: plantmd-api
  template:
    metadata:
      labels:
        app: plantmd-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/plantmd-pro/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: plantmd-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plantmd-secrets
                  key: secret-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 5
          volumeMounts:
            - name: models
              mountPath: /app/models
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: plantmd-models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: plantmd-api-service
spec:
  selector:
    app: plantmd-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: plantmd-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: plantmd-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
